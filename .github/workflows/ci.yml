name: ci

on:
  push:
    branches:
      - main
      - feature/**
      - 0**-*
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Cricsheet.Api.slnx

      - name: Verify formatting
        run: dotnet format Cricsheet.Api.slnx --verify-no-changes --severity warn

      - name: Build with analyzers and warnings as errors
        run: dotnet build Cricsheet.Api.slnx --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test Cricsheet.Api.slnx --configuration Release --no-build --verbosity normal